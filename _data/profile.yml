short_bio_text_justify: false
short_bio: >-
  <p>
    I am a Ph.D. student at Seoul National University of Science and Technology, advised by <a href="https://scholar.google.com/citations?user=QtI8XmgAAAAJ&hl=ko" target="_blank">Sangheum Hwang</a>.
  </p>
  The thread running through my work is understanding what a model does not know, and when it should not be trusted. 
  On one side, this leads me to out-of-distribution detection and uncertainty estimation, often with large-scale vision-language models such as CLIP.
  On the other side lies the flip problem—not detecting knowledge, but removing it—which I explore through machine unlearning in LLMs and concept erasure in text-to-image diffusion models, asking how a deployed model can reliably forget or refuse what it should no longer retain.
  <p>

  </p>

